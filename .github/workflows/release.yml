name: Release

# Triggered when a version tag is pushed: git tag v1.5.0 && git push origin v1.5.0
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ── 1. Generate changelog & create GitHub Release ────────────────────────
  release-notes:
    name: Generate changelog & create release
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.cliff.outputs.content }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by git-cliff

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog for this tag
        id: cliff
        shell: bash
        run: |
          content="$(git-cliff --config cliff.toml --latest --strip header)"
          {
            echo 'content<<EOF'
            echo "$content"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          draft: true        # publish manually after uploading assets
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── 2. Build Windows portable binary ─────────────────────────────────────
  build-windows:
    name: Build Windows portable
    runs-on: windows-latest
    needs: release-notes

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri application
        run: pnpm tauri build

      - name: Upload portable EXE
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/zapret-gui.exe
