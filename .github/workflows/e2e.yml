name: E2E Binary Smoke

# Runs against a real compiled binary — heavier than unit tests, so it runs:
#   1. Manually (workflow_dispatch) — for developer validation
#   2. On release tags — as a final gate before the draft release is published
#
# NOT run on every push because it requires a full Tauri build (~5–10 min).
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build mode
        required: true
        default: debug
        type: choice
        options: [debug, release]

  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Binary smoke test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm build

      # For release tags always build in release mode; for manual runs use the input.
      - name: Build Rust binary (debug)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_mode == 'debug' }}
        working-directory: src-tauri
        run: cargo build

      - name: Build Rust binary (release)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_mode == 'release') }}
        working-directory: src-tauri
        run: cargo build --release

      - name: Determine binary path
        id: binary
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push" -or "${{ inputs.build_mode }}" -eq "release") {
            echo "path=src-tauri\target\release\zapret-gui.exe" >> $env:GITHUB_OUTPUT
          } else {
            echo "path=src-tauri\target\debug\zapret-gui.exe" >> $env:GITHUB_OUTPUT
          }

      - name: Run binary smoke tests
        shell: pwsh
        run: |
          .\tests\e2e\smoke.ps1 -BinaryPath "${{ steps.binary.outputs.path }}" -StartupWaitSeconds 8

      - name: Upload crash reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-reports
          path: ${{ env.TEMP }}\zapret-gui-crashes\
          if-no-files-found: ignore
