<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapret UI Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
        /* БАЗОВЫЕ СТИЛИ (Дискорд-фон и шрифты) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #313338; /* Цвет фона Discord */
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; /* Чтобы не было полос прокрутки */
        }

        /* КОНТЕЙНЕР ПРИЛОЖЕНИЯ (Компактное, вертикальное окно) */
        .app-window {
            width: 320px;
            height: 480px;
            background-color: #2b2d31; /* Чуть темнее, для объема */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05); /* Легкая рамка */
        }

        /* ЗАГОЛОВОК И СТАТУС */
        .header {
            text-align: center;
            width: 100%;
        }

        h1 {
            color: #f2f3f5; /* Белый Дискорда */
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        .status-text {
            color: #b5bac1; /* Серый Дискорда */
            font-size: 14px;
            margin: 0;
            transition: color 0.3s ease;
        }

        /* ГЛАВНАЯ АНИМИРОВАННАЯ КНОПКА */
        .power-button-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .power-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #404249; /* Базовый серый кнопки */
            border: none;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 0 rgba(88, 101, 242, 0); /* Начальная тень */
        }

        /* Иконка выключения */
        .power-icon {
            width: 50px;
            height: 50px;
            stroke: #b5bac1; /* Цвет иконки в выкл. состоянии */
            stroke-width: 2.5;
            fill: none;
            transition: stroke 0.3s ease;
        }

        /* СОСТОЯНИЕ "ВКЛЮЧЕНО" (Акцентные цвета) */
        .app-window.active .status-text {
            color: #5865f2; /* Синий Дискорда (Blurple) */
        }

        .app-window.active .power-button {
            background-color: #5865f2; /* Синий фон кнопки */
            transform: scale(1.05);
            /* Неоновое свечение */
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.6), 0 0 40px rgba(88, 101, 242, 0.4);
        }

        .app-window.active .power-icon {
            stroke: #ffffff; /* Белая иконка при включении */
        }

        /* ЭФФЕКТ ПУЛЬСАЦИИ ПРИ РАБОТЕ */
        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(88, 101, 242, 0.6), 0 0 0px rgba(88, 101, 242, 0.4); }
            50% { box-shadow: 0 0 25px rgba(88, 101, 242, 0.8), 0 0 20px rgba(88, 101, 242, 0.5); }
            100% { box-shadow: 0 0 20px rgba(88, 101, 242, 0.6), 0 0 0px rgba(88, 101, 242, 0.4); }
        }

        .app-window.active .power-button {
            animation: pulse 2s infinite;
        }

    </style>
</head>
<body>

    <div class="app-window" id="appWindow">
        <div class="header">
            <h1>Zapret</h1>
            <p class="status-text" id="statusText">Защита отключена</p>
        </div>

        <div class="power-button-container">
            <button class="power-button" id="powerBtn" onclick="toggleService()">
                <svg class="power-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                    <line x1="12" y1="2" x2="12" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <script>
        function toggleService() {
            const appWindow = document.getElementById('appWindow');
            const statusText = document.getElementById('statusText');

            appWindow.classList.toggle('active');

            if (appWindow.classList.contains('active')) {
                statusText.innerText = "Включение...";
            } else {
                statusText.innerText = "Zapret отключен";
            }
        }
    </script>
</body>
</html>
